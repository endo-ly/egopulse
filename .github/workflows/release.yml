name: Release

# Release runs only after the CI workflow on `main` completes successfully.
# The released SHA is always the CI run's head SHA, so "tested code",
# "shipped code", and "tagged code" stay on the same commit. The tag is created
# only after every artifact build succeeds; it is never pushed first.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-main
  # Do not cancel an in-flight release; a second push will wait or skip via the
  # tag collision checks rather than racing the publish step.
  cancel-in-progress: false

jobs:
  compute-version:
    name: Compute Release Version
    # Only release commits whose CI run actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.version }}
      head_sha: ${{ steps.sha.outputs.head_sha }}
    steps:
      - name: Resolve CI head SHA
        id: sha
        run: echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.head_sha }}
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "//;s/"//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute candidate tag
        id: tag
        run: |
          # Derive the date from the commit itself (not the wall clock) so the
          # candidate is stable across reruns of this release run for the same
          # SHA. The run number disambiguates same-day releases.
          HEAD_SHA="${{ steps.sha.outputs.head_sha }}"
          COMMIT_DATE=$(git show -s --format=%cd --date=format:'%Y%m%d' "${HEAD_SHA}")
          RUN=${{ github.run_number }}
          RELEASE_TAG="${COMMIT_DATE}.${RUN}"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Candidate release tag: ${RELEASE_TAG} (not created yet)"

  build-web:
    name: Build Web Assets
    needs: [compute-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.compute-version.outputs.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded web assets
        env:
          EGOPULSE_RELEASE_TAG: ${{ needs.compute-version.outputs.release_tag }}
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: web/dist
          if-no-files-found: error

  build-assets:
    name: Build ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.os }}
    needs: [compute-version, build-web]
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: linux-x86_64
            os: ubuntu-latest
            bin: egopulse
            target_triple: x86_64-unknown-linux-gnu
            asset_triple: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - label: linux-arm64
            os: ubuntu-24.04-arm
            bin: egopulse
            target_triple: aarch64-unknown-linux-gnu
            asset_triple: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - label: macos-arm64
            os: macos-14
            bin: egopulse
            target_triple: aarch64-apple-darwin
            asset_triple: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.compute-version.outputs.head_sha }}

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: web/dist

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target.target_triple }}

      - name: Build release binary
        shell: bash
        env:
          EGOPULSE_RELEASE_TAG: ${{ needs.compute-version.outputs.release_tag }}
        run: cargo build --release

      - name: Package archive
        shell: bash
        run: |
          RELEASE_VERSION="${{ needs.compute-version.outputs.release_version }}"
          ASSET_NAME="egopulse-${RELEASE_VERSION}-${{ matrix.target.asset_triple }}.tar.gz"
          tar -czf "$ASSET_NAME" -C target/release "${{ matrix.target.bin }}"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.label }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [compute-version, build-assets]
    env:
      RELEASE_TAG: ${{ needs.compute-version.outputs.release_tag }}
      HEAD_SHA: ${{ needs.compute-version.outputs.head_sha }}

    steps:
      - name: Checkout CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create or reuse release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --tags origin

          # If the candidate tag already exists, it must point at the same SHA.
          # We never move an existing tag to a different commit.
          EXISTING_SHA=$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}" 2>/dev/null || echo "")
          if [ -n "${EXISTING_SHA}" ]; then
            if [ "${EXISTING_SHA}" = "${HEAD_SHA}" ]; then
              echo "Tag ${RELEASE_TAG} already exists at ${HEAD_SHA}; reusing (rerun-safe)"
            else
              echo "Tag ${RELEASE_TAG} exists at ${EXISTING_SHA}; refusing to move it to ${HEAD_SHA}" >&2
              exit 1
            fi
          else
            git tag "${RELEASE_TAG}" "${HEAD_SHA}"
            git push origin "${RELEASE_TAG}"
            echo "Created tag ${RELEASE_TAG} at ${HEAD_SHA}"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Idempotent: if the release already exists (e.g. a previous run
          # created the tag and release but failed uploading assets), upload
          # the artifacts again instead of creating a duplicate release.
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; uploading assets"
            gh release upload "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              dist/*.tar.gz dist/SHA256SUMS.txt --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              -t "${RELEASE_TAG}" \
              --generate-notes \
              --target "${HEAD_SHA}" \
              dist/*.tar.gz dist/SHA256SUMS.txt
          fi

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run format check
        run: cargo fmt --check

      - name: Run cargo check
        run: cargo check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find ripgrep
          sudo ln -sf $(which fdfind) /usr/local/bin/fd

      - name: Run tests
        run: cargo test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Print coverage summary
        run: cargo llvm-cov --summary-only

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Check vulnerabilities
        # rustls-webpki 0.102.x (serenity transitive dep) has 4 unfixable advisories.
        # serenity 0.12.x pins tokio-tungstenite 0.21 → rustls 0.22 → rustls-webpki 0.102.
        # Fix requires serenity upstream update — tracked in serenity#XXXX.
        run: cargo audit --ignore RUSTSEC-2026-0049 --ignore RUSTSEC-2026-0098 --ignore RUSTSEC-2026-0099 --ignore RUSTSEC-2026-0104

      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

model: gpt-4o-mini
# Localhost-style endpoints such as LM Studio may omit api_key.
api_key: replace-me
base_url: https://api.openai.com/v1
log_level: info
compaction_timeout_secs: 180
max_history_messages: 50
max_session_messages: 40
compact_keep_recent: 20

channels:
  web:
    enabled: true
    host: 127.0.0.1
    port: 10961
    # Set this when exposing EgoPulse via Tailscale Serve or any non-local browser.
    auth_token: replace-web-token
    allowed_origins:
      - http://127.0.0.1:10961
      # - https://egopulse.<tailnet>.ts.net
  # discord:
  #   enabled: true
  #   bot_token: your-discord-bot-token
  #   allowed_channels:
  #     - 1234567890
  # telegram:
  #   enabled: true
  #   bot_token: your-telegram-bot-token
  #   bot_username: your_bot_username
  #   allowed_user_ids:
  #     - 123456789

